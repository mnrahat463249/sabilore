<!DOCTYPE html>
<html>
<head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
@media (max-width: 991.98px) {
    #navbarNavUnified.navbar-collapse {
        position: fixed !important; top: 0 !important; left: 0 !important; width: 100vw !important; height: 100vh !important;
        background: red !important; z-index: 1060 !important; display: flex !important; flex-direction: column !important;
        transform: translateX(100%) !important; transition: transform 0.4s !important;
    }
    #navbarNavUnified.navbar-collapse.show, #navbarNavUnified.navbar-collapse.collapsing {
        transform: translateX(0) !important;
    }
    #navbarNavUnified.navbar-collapse.collapsing { height: 100vh !important; transition: transform 0.4s !important; }
}
</style>
</head>
<body>
<button class="navbar-toggler d-lg-none" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavUnified">TOGGLE</button>
<div class="collapse navbar-collapse" id="navbarNavUnified">
    <button class="btn-close" data-bs-toggle="collapse" data-bs-target="#navbarNavUnified"></button>
    <ul><li><a href="#">Link 1</a></li></ul>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
