<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0 ">
    <title>SABILORÉ | Admin Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0d14;
            overflow: hidden;
        }

        .bg-grid {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 1;
            pointer-events: none;
        }

        .bg-gradient-layer {
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 15% 10%, rgba(0, 123, 255, 0.12) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 85% 80%, rgba(111, 66, 193, 0.10) 0%, transparent 55%),
                radial-gradient(ellipse 50% 40% at 50% 50%, rgba(0, 212, 255, 0.05) 0%, transparent 70%),
                #0a0d14;
            z-index: 0;
            pointer-events: none;
        }

        .login-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 1.5rem;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 2.5rem;
            -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px);
        }

        .brand {
            text-align: center;
            margin-bottom: 2rem;
        }

        .brand-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #007bff, #00d4ff);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
        }

        .brand-icon i {
            font-size: 1.5rem;
            color: #fff;
        }

        .brand h2 {
            color: #fff;
            font-size: 1.6rem;
            letter-spacing: 0.15em;
            margin-bottom: 0.25rem;
        }

        .brand p {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.85rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 0.5rem;
            display: block;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.9rem;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            padding: 0.75rem 0.75rem 0.75rem 2.5rem;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: #007bff;
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.15);
            color: #fff;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }

        .btn-login {
            width: 100%;
            padding: 0.8rem;
            background: linear-gradient(135deg, #007bff, #00d4ff);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 700;
            font-size: 0.95rem;
            letter-spacing: 0.04em;
            transition: all 0.3s ease;
            margin-top: 0.5rem;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 123, 255, 0.4);
        }

        .btn-login:disabled {
            opacity: 0.6;
            transform: none;
        }

        .alert-box {
            background: rgba(220, 53, 69, 0.15);
            border: 1px solid rgba(220, 53, 69, 0.3);
            border-radius: 10px;
            color: #ff6b7a;
            padding: 0.75rem 1rem;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            display: none;
        }

        .alert-box.show {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .back-link {
            text-align: center;
            margin-top: 1.5rem;
        }

        .back-link a {
            color: rgba(255, 255, 255, 0.4);
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.3s;
        }

        .back-link a:hover {
            color: #007bff;
        }

        .glow-orb {
            position: fixed;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.15;
            z-index: 0;
        }

        .glow-orb.blue {
            background: #007bff;
            top: -100px;
            right: -50px;
        }

        .glow-orb.purple {
            background: #6f42c1;
            bottom: -100px;
            left: -50px;
        }

        .pwd-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            padding: 0;
        }

        .pwd-toggle:hover {
            color: rgba(255, 255, 255, 0.6);
        }

        
        .site-preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #080808;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .preloader-content {
            text-align: center;
        }

        .preloader-logo {
            width: 100px;
            height: auto;
            opacity: 0;
            transform: scale(0.9);
            transition: all 0.5s ease;
            filter: brightness(1.2);
            animation: preloader-pulse 2s infinite ease-in-out;
        }

        @keyframes preloader-pulse {

            0%,
            100% {
                transform: scale(1);
                opacity: 0.8;
            }

            50% {
                transform: scale(1.1);
                opacity: 1;
            }
        }

        .site-preloader.fade-out {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        
        .forgot-password-link {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.82rem;
            text-decoration: none;
            transition: color 0.2s;
        }

        .forgot-password-link:hover {
            color: #007bff;
        }

        .forgot-modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: rgba(0, 0, 0, 0.7);
            -webkit-backdrop-filter: blur(6px);
            backdrop-filter: blur(6px);
            align-items: center;
            justify-content: center;
        }

        .forgot-modal-content {
            width: 100%;
            max-width: 400px;
            padding: 1.5rem;
        }

        .modal-login-card {
            position: relative;
        }

        .forgot-modal-close {
            position: absolute;
            top: 16px;
            right: 20px;
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.4);
            font-size: 1.2rem;
            cursor: pointer;
        }

        .brand-icon-email {
            background: linear-gradient(135deg, #6f42c1, #007bff);
        }

        .brand-icon-otp {
            background: linear-gradient(135deg, #198754, #20c997);
        }

        .brand-icon-pwd {
            background: linear-gradient(135deg, #fd7e14, #ffc107);
        }

        .modal-title-text {
            font-size: 1.3rem;
        }

        .otp-input-field {
            letter-spacing: 0.4em;
            text-align: center;
            font-size: 1.2rem;
            font-weight: 700;
        }

        .btn-otp-submit {
            background: linear-gradient(135deg, #198754, #20c997);
        }

        .forgot-back-link {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.8rem;
            text-decoration: none;
        }

        .hidden-step {
            display: none;
        }
    </style>
</head>

<body>
    <div class="bg-gradient-layer"></div>
    <div class="bg-grid"></div>
    <div class="glow-orb blue"></div>
    <div class="glow-orb purple"></div>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="brand">
                <div class="brand-icon">
                    <i class="fas fa-shield-alt"></i>
                </div>
                <h2>SABILORÉ</h2>
                <p>Admin Control Panel</p>
            </div>

            <div class="alert-box" id="error-box">
                <i class="fas fa-exclamation-circle"></i>
                <span id="error-text"></span>
            </div>

            <form id="login-form">
                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" class="form-control" id="email"  required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" class="form-control" id="password"  required>
                        <button type="button" class="pwd-toggle" onclick="togglePwd()" title="Toggle Password Visibility" aria-label="Toggle Password Visibility">
                            <i class="far fa-eye" id="pwd-eye"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-login" id="login-btn">
                    <span id="btn-text">Sign In to Dashboard</span>
                    <span id="btn-spinner" class="spinner-border spinner-border-sm d-none ms-2"></span>
                </button>
            </form>

            <div class="text-center mt-3">
                <a href="javascript:void(0)" onclick="openForgotModal()" class="forgot-password-link">
                    <i class="fas fa-lock me-1"></i>Forgot password?
                </a>
            </div>

            <div class="back-link">
                <a href="/"><i class="fas fa-arrow-left me-1"></i> Back to Website</a>
            </div>
        </div>
    </div>

    
    <div id="forgot-modal" class="forgot-modal-overlay">
        <div class="forgot-modal-content">
            <div class="login-card modal-login-card">
                <button onclick="closeForgotModal()" class="forgot-modal-close" title="Close" aria-label="Close">
                    <i class="fas fa-times"></i>
                </button>

                
                <div id="fp-step-1">
                    <div class="brand mb-3">
                        <div class="brand-icon brand-icon-email">
                            <i class="fas fa-envelope"></i>
                        </div>
                        <h2 class="modal-title-text">Reset Password</h2>
                        <p>Enter the admin email to receive a reset code.</p>
                    </div>
                    <div class="alert-box" id="fp-err-1"><i class="fas fa-exclamation-circle"></i><span
                            id="fp-err-1-text"></span></div>
                    <div class="form-group">
                        <label>Admin Email</label>
                        <div class="input-wrapper">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="fp-email" class="form-control"
                                >
                        </div>
                    </div>
                    <button class="btn-login" onclick="sendResetOtp()">
                        <span id="fp-send-text">Send Reset Code</span>
                        <span id="fp-send-spinner" class="spinner-border spinner-border-sm d-none ms-2"></span>
                    </button>
                </div>

                
                <div id="fp-step-2" class="hidden-step">
                    <div class="brand mb-3">
                        <div class="brand-icon brand-icon-otp">
                            <i class="fas fa-key"></i>
                        </div>
                        <h2 class="modal-title-text">Enter Reset Code</h2>
                        <p id="fp-step2-sub">Check your email for the 6-digit code.</p>
                    </div>
                    <div class="alert-box" id="fp-err-2"><i class="fas fa-exclamation-circle"></i><span
                            id="fp-err-2-text"></span></div>
                    <div class="form-group">
                        <label>6-Digit Code</label>
                        <div class="input-wrapper">
                            <i class="fas fa-shield-alt"></i>
                            <input type="text" id="fp-otp" class="form-control otp-input-field"  maxlength="6">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>New Password <small class="opacity-50">(min 8 characters)</small></label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="fp-new-pwd" class="form-control" >
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Confirm Password</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="fp-confirm-pwd" class="form-control"
                                >
                        </div>
                    </div>
                    <button class="btn-login btn-otp-submit" onclick="submitReset()">
                        <span id="fp-reset-text">Reset Password</span>
                        <span id="fp-reset-spinner" class="spinner-border spinner-border-sm d-none ms-2"></span>
                    </button>
                    <div class="text-center mt-2">
                        <a href="javascript:void(0)"
                            onclick="document.getElementById('fp-step-2').style.display='none'; document.getElementById('fp-step-1').style.display='block';"
                            class="forgot-back-link">
                            <i class="fas fa-arrow-left me-1"></i>Back
                        </a>
                    </div>
                </div>

                
                <div id="fp-step-3" class="text-center hidden-step">
                    <div class="brand-icon brand-icon-otp mx-auto mb-3">
                        <i class="fas fa-check text-white fs-3"></i>
                    </div>
                    <h2 class="text-white mb-2 fs-4">Password Reset!</h2>
                    <p class="text-white-50 mb-4">Your password has been updated. You can
                        now sign in with your new password.</p>
                    <button class="btn-login" onclick="closeForgotModal()">Back to Login</button>
                </div>
            </div>
        </div>
    </div>



    <script>
        const API_BASE = '/api/admin';

        // If already logged in, redirect
        if (localStorage.getItem('admin_token')) {
            window.location.href = 'index';
        }

        function togglePwd() {
            const input = document.getElementById('password');
            const icon = document.getElementById('pwd-eye');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        function showError(msg) {
            const box = document.getElementById('error-box');
            document.getElementById('error-text').textContent = msg;
            box.classList.add('show');
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            const spinner = document.getElementById('btn-spinner');

            btn.disabled = true;
            spinner.classList.remove('d-none');
            document.getElementById('error-box').classList.remove('show');

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            try {
                const res = await fetch(`${API_BASE}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (!res.ok) {
                    throw new Error(data.message || 'Login failed');
                }

                localStorage.setItem('admin_token', data.token);
                localStorage.setItem('admin_user', JSON.stringify(data.admin));
                window.location.href = 'index';
            } catch (err) {
                showError(err.message);
            } finally {
                btn.disabled = false;
                spinner.classList.add('d-none');
            }
        });

        // ---- Forgot Password Helpers ----

        function openForgotModal() {
            const m = document.getElementById('forgot-modal');
            m.style.display = 'flex';
            // Reset to step 1
            document.getElementById('fp-step-1').style.display = 'block';
            document.getElementById('fp-step-2').style.display = 'none';
            document.getElementById('fp-step-3').style.display = 'none';
            document.getElementById('fp-err-1').classList.remove('show');
            document.getElementById('fp-err-2').classList.remove('show');
        }

        function closeForgotModal() {
            document.getElementById('forgot-modal').style.display = 'none';
        }

        async function sendResetOtp() {
            const email = document.getElementById('fp-email').value.trim();
            const errBox = document.getElementById('fp-err-1');
            const errText = document.getElementById('fp-err-1-text');
            const spinner = document.getElementById('fp-send-spinner');
            const btnText = document.getElementById('fp-send-text');

            errBox.classList.remove('show');
            spinner.classList.remove('d-none');
            btnText.textContent = 'Sending…';

            try {
                const res = await fetch(`${API_BASE}/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();

                if (!res.ok) throw new Error(data.message);

                // Move to step 2
                document.getElementById('fp-step-1').style.display = 'none';
                document.getElementById('fp-step-2').style.display = 'block';
                document.getElementById('fp-step2-sub').textContent =
                    `Check your email for the 6-digit code. ${email && email !== 'sabilorebysiam@admin.com' ? 'If email is incorrect, code will not be sent.' : ''}`;
            } catch (err) {
                errText.textContent = err.message || 'Failed to send code.';
                errBox.classList.add('show');
            } finally {
                spinner.classList.add('d-none');
                btnText.textContent = 'Send Reset Code';
            }
        }

        async function submitReset() {
            const email = document.getElementById('fp-email').value.trim();
            const otp = document.getElementById('fp-otp').value.trim();
            const newPwd = document.getElementById('fp-new-pwd').value;
            const confirmPwd = document.getElementById('fp-confirm-pwd').value;

            const errBox = document.getElementById('fp-err-2');
            const errText = document.getElementById('fp-err-2-text');
            const spinner = document.getElementById('fp-reset-spinner');
            const btnText = document.getElementById('fp-reset-text');

            errBox.classList.remove('show');

            if (newPwd !== confirmPwd) {
                errText.textContent = 'Passwords do not match.';
                errBox.classList.add('show');
                return;
            }
            if (newPwd.length < 8) {
                errText.textContent = 'Password must be at least 8 characters.';
                errBox.classList.add('show');
                return;
            }

            spinner.classList.remove('d-none');
            btnText.textContent = 'Resetting…';

            try {
                const res = await fetch(`${API_BASE}/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, otp, newPassword: newPwd })
                });
                const data = await res.json();

                if (!res.ok) throw new Error(data.message);

                // Show success step
                document.getElementById('fp-step-2').style.display = 'none';
                document.getElementById('fp-step-3').style.display = 'block';
            } catch (err) {
                errText.textContent = err.message || 'Reset failed.';
                errBox.classList.add('show');
            } finally {
                spinner.classList.add('d-none');
                btnText.textContent = 'Reset Password';
            }
        }
    </script>
</body>

</html>
