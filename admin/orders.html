<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0 ">
    <title>SABILORÉ | Order Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/admin.css">
</head>

<body>
    
    <div id="admin-layout-placeholder"></div>

    <div class="admin-main-content p-5">
        <h2 class="fw-bold mb-5">Order Management</h2>

        <div class="card p-4">
            <ul class="nav nav-pills mb-4" id="order-tabs">
                <li class="nav-item">
                    <button type="button" class="nav-link active rounded-pill me-2 px-4" data-filter="all" aria-current="page">All Orders</button>
                </li>
                <li class="nav-item">
                    <button type="button" class="nav-link rounded-pill me-2 px-4" data-filter="registered">Registered
                        Members</button>
                </li>
                <li class="nav-item">
                    <button type="button" class="nav-link rounded-pill px-4" data-filter="guest">Guest Orders</button>
                </li>
            </ul>

            <div class="row g-3 mb-4">
                <div class="col-md-4">
                    <div class="input-group shadow-sm rounded-pill overflow-hidden">
                        <span class="input-group-text bg-white border-end-0"><i
                                class="fas fa-search text-muted"></i></span>
                        <input type="text" id="order-search" class="form-control border-start-0"
                             aria-label="Search orders">
                    </div>
                </div>
                <div class="col-md-3">
                    <select id="status-filter" class="form-select rounded-pill shadow-sm" aria-label="Filter by status">
                        <option value="">All Statuses</option>
                        <option value="Pending">⏳ Pending</option>
                        <option value="Processing">🔄 Processing</option>
                        <option value="Completed">✅ Completed</option>
                        <option value="Cancelled">❌ Cancelled</option>
                    </select>
                </div>
            </div>

            <div class="table-responsive">
                <table class="table align-middle">
                    <thead class="bg-light small text-uppercase fw-bold">
                        <tr>
                            <th>Order ID</th>
                            <th>Customer</th>
                            <th>Method</th>
                            <th>Amount</th>
                            <th>Status</th>
                            <th>Date</th>
                            <th class="text-end">Action</th>
                        </tr>
                    </thead>
                    <tbody id="admin-orders-table">
                        <tr>
                            <td colspan="7" class="text-center text-muted py-4">
                                <div class="spinner-border spinner-border-sm me-2"></div> Loading orders...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    
    
    <div class="modal fade" id="linkCustomerModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content rounded-4 border-0 shadow">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold">Link Order to Customer</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <div id="link-order-info" class="mb-4 p-3 bg-light rounded-3">
                        
                    </div>
                    
                    <div class="mb-3">
                        <label for="customer-link-search" class="form-label small fw-bold text-uppercase">Search Customer</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0"><i class="fas fa-search"></i></span>
                            <input type="text" id="customer-link-search" class="form-control border-start-0" >
                        </div>
                    </div>
                    
                    <div class="table-responsive modal-table-scroll">
                        <table class="table table-hover align-middle">
                            <thead class="bg-light sticky-top">
                                <tr class="table-row-xs">
                                    <th>Customer</th>
                                    <th>Contact</th>
                                    <th class="text-end">Action</th>
                                </tr>
                            </thead>
                            <tbody id="link-customer-list">
                                
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    
    <div class="modal fade" id="orderDetailModal" tabindex="-1">
        <div class="modal-dialog modal-xl">
            <div class="modal-content rounded-4 border-0 shadow">
                <div class="modal-header border-0">
                    <h5 class="modal-title fw-bold" id="order-detail-title">Order Details</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4" id="order-detail-content">
                    
                </div>
            </div>
        </div>
    </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/admin.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            renderAdminLayout();
            loadAdminOrders();
        });
    </script>
</body>

</html>
