<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Plate Management | SABILORÉ Admin</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/admin.css">
    <style>
        #toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
        }

        .form-control-color {
            width: 50px !important;
            height: 38px !important;
            padding: 4px !important;
            border-radius: 50rem 0 0 50rem !important;
            cursor: pointer;
            border-right: none !important;
        }

        #colorHex {
            border-top-right-radius: 50rem !important;
            border-bottom-right-radius: 50rem !important;
        }

        .color-preview-circle {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: inline-block;
            border: 1px solid rgba(0, 0, 0, 0.1);
            vertical-align: middle;
        }
        .rounded-pill-start {
            border-radius: 50rem 0 0 50rem !important;
        }

        .rounded-pill-end {
            border-radius: 0 50rem 50rem 0 !important;
        }
    </style>
</head>

<body class="bg-light">

    
    <div id="admin-layout-placeholder"></div>

    
    <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 pt-4">
        <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pb-2 mb-3 border-bottom">
            <h1 class="h2 fw-bold">Color Plate Management</h1>
            <button class="btn btn-dark" data-bs-toggle="modal" data-bs-target="#colorModal"
                onclick="resetColorModal()">
                <i class="fas fa-plus me-2"></i> Add New Color
            </button>
        </div>

        
        <div class="row mb-4">
            <div class="col-md-6 col-lg-4">
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0 rounded-pill-start">
                        <i class="fas fa-search text-muted"></i>
                    </span>
                    <input type="text" id="colorSearchInput" class="form-control border-start-0 rounded-pill-end"
                        
                        oninput="filterColors()">
                </div>
            </div>
            <div class="col-auto d-flex align-items-center">
                <span id="colorCount" class="text-muted small"></span>
            </div>
        </div>

        
        <div class="row" id="colorGrid">
            
            <div class="col-12 text-center py-5">
                <div class="spinner-border text-dark" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
            </div>
        </div>
    </main>
    </div>
    </div>

    
    <div class="modal fade" id="colorModal" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="colorModalTitle">Add New Color</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form id="colorForm">
                    <div class="modal-body">
                        <input type="hidden" id="colorId">
                        <div class="mb-3">
                            <label class="form-label">Color Name</label>
                            <input type="text" class="form-control" id="colorName" required
                                >
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Hex Code</label>
                            <div class="input-group">
                                <input type="color" class="form-control form-control-color" id="colorHexPicker"
                                    value="#000000" title="Choose your color">
                                <input type="text" class="form-control" id="colorHex" required 
                                    pattern="^#([A-Fa-f0-9]{3}|[A-Fa-f0-9]{6})$">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Status</label>
                            <select class="form-select" id="colorStatus">
                                <option value="active">Active</option>
                                <option value="inactive">Inactive</option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-dark" id="saveColorBtn">Save Color</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/admin.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            renderAdminLayout();
            loadColors();

            // Sync hex picker and text input
            const hexPicker = document.getElementById('colorHexPicker');
            const hexInput = document.getElementById('colorHex');

            hexPicker.addEventListener('input', () => {
                hexInput.value = hexPicker.value.toUpperCase();
            });
            hexInput.addEventListener('input', () => {
                let val = hexInput.value.trim();
                // Auto-add # if missing
                if (val && !val.startsWith('#')) {
                    val = '#' + val;
                    hexInput.value = val;
                }
                // Sync with picker if valid 6-char hex
                if (/^#([A-Fa-f0-9]{6})$/.test(val)) {
                    hexPicker.value = val;
                }
            });

            document.getElementById('colorForm').addEventListener('submit', saveColor);
        });

        let allColorsData = []; // Store for filtering

        async function loadColors() {
            try {
                const response = await adminFetch('/colors');
                if (!response) return;
                const colors = await response.json();
                allColorsData = colors;
                renderColorGrid(colors);
            } catch (error) {
                console.error('Error loading colors:', error);
            }
        }

        function renderColorGrid(colors) {
            const grid = document.getElementById('colorGrid');
            const countEl = document.getElementById('colorCount');

            countEl.textContent = `${colors.length} color${colors.length !== 1 ? 's' : ''}`;

            if (colors.length === 0) {
                grid.innerHTML = '<div class="col-12 text-center py-5 text-muted">No colors found.</div>';
                return;
            }

            grid.innerHTML = colors.map(c => `
                <div class="col-md-4 col-lg-3 mb-4 color-card-item">
                    <div class="card h-100 shadow-sm border-0">
                        <div class="card-body">
                            <div class="d-flex align-items-center mb-3">
                                <div class="color-preview-circle me-3" style="background-color: ${c.hex_code}"></div>
                                <div>
                                    <h6 class="mb-0 fw-bold">${c.name}</h6>
                                    <small class="text-muted text-uppercase">${c.hex_code}</small>
                                </div>
                            </div>
                            <div class="d-flex justify-content-between align-items-center">
                                <span class="badge ${c.status === 'active' ? 'bg-success' : 'bg-secondary'} bg-opacity-10 text-${c.status === 'active' ? 'success' : 'secondary'} small text-uppercase">
                                    ${c.status}
                                </span>
                                <div class="btn-group">
                                    <button class="btn btn-sm btn-outline-dark" onclick="editColor(${JSON.stringify(c).replace(/"/g, '&quot;')})">
                                        <i class="fas fa-edit"></i>
                                    </button>
                                    <button class="btn btn-sm btn-outline-danger" onclick="deleteColor(${c.id})">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function filterColors() {
            const query = document.getElementById('colorSearchInput').value.toLowerCase().trim();
            if (!query) {
                renderColorGrid(allColorsData);
                return;
            }
            const filtered = allColorsData.filter(c =>
                c.name.toLowerCase().includes(query) ||
                c.hex_code.toLowerCase().includes(query)
            );
            renderColorGrid(filtered);
        }

        function resetColorModal() {
            document.getElementById('colorModalTitle').textContent = 'Add New Color';
            document.getElementById('colorId').value = '';
            document.getElementById('colorName').value = '';
            document.getElementById('colorHex').value = '#000000';
            document.getElementById('colorHexPicker').value = '#000000';
            document.getElementById('colorStatus').value = 'active';
        }

        function editColor(c) {
            document.getElementById('colorModalTitle').textContent = 'Edit Color';
            document.getElementById('colorId').value = c.id;
            document.getElementById('colorName').value = c.name;
            document.getElementById('colorHex').value = c.hex_code;
            document.getElementById('colorHexPicker').value = c.hex_code;
            document.getElementById('colorStatus').value = c.status;

            const modal = new bootstrap.Modal(document.getElementById('colorModal'));
            modal.show();
        }

        async function saveColor(e) {
            e.preventDefault();
            const id = document.getElementById('colorId').value;
            let hex = document.getElementById('colorHex').value.trim();
            if (hex && !hex.startsWith('#')) hex = '#' + hex;

            const data = {
                name: document.getElementById('colorName').value,
                hex_code: hex,
                status: document.getElementById('colorStatus').value
            };

            const btn = document.getElementById('saveColorBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Saving...';

            try {
                const method = id ? 'PUT' : 'POST';
                const url = id ? `/colors/${id}` : '/colors';

                const response = await adminFetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (!response) return;

                showToast(`Color ${id ? 'updated' : 'added'} successfully!`);
                bootstrap.Modal.getInstance(document.getElementById('colorModal')).hide();
                loadColors();
            } catch (error) {
                showToast(error.message, 'danger');
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Save Color';
            }
        }

        async function deleteColor(id) {
            const confirmed = await showSabiloreConfirm('Are you sure you want to delete this color? This may affect products using it.', 'CONFIRM DELETE');
            if (!confirmed) return;
            try {
                const res = await adminFetch(`/colors/${id}`, { method: 'DELETE' });
                if (res && res.ok) {
                    showSabiloreModal('Color deleted successfully', 'success', 'DELETED');
                    loadColors();
                }
            } catch (error) {
                showSabiloreModal(error.message, 'error', 'DELETE FAILED');
            }
        }
    </script>
</body>

</html>
