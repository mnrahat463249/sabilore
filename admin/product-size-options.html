<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0 ">
    <title>SABILORÉ | Product (Size Chart)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/admin.css">
    <style>
        .edit-option-preview-img {
            width: 80px;
            height: 100px;
            object-fit: cover;
        }
    </style>
</head>

<body>
    <div id="admin-layout-placeholder"></div>

    <div class="admin-main-content">
        <div class="p-4 p-md-5">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold mb-0">Product (Size Chart)</h2>
                <button class="btn btn-dark rounded-pill px-4" onclick="openAddOptionModal()" id="addNewOptionBtn">
                    <i class="fas fa-plus me-2"></i> Add New Option
                </button>
            </div>

            <div class="card p-4">
                <p class="text-muted small mb-4">Note: A maximum of 3 size options can be added. These will be displayed
                    as an interactive shape guide on the product page.</p>
                <div class="table-responsive">
                    <table class="table align-middle">
                        <thead class="text-muted small bg-light">
                            <tr>
                                <th>Display Order</th>
                                <th>Image</th>
                                <th>Label Name</th>
                                <th class="text-end">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="size-options-table">
                            <tr>
                                <td colspan="4" class="text-center py-4">Loading options...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    
    <div class="modal fade" id="addOptionModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header border-bottom border-light">
                    <h5 class="modal-title fw-bold">Add Size Option</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" title="Close" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="addOptionForm">
                        <div class="mb-3">
                            <label for="add-option-label" class="form-label fw-semibold small text-muted">Label Name / Number</label>
                            <input type="text" class="form-control form-control-lg bg-light" id="add-option-label"
                                required  title="Label Name">
                        </div>
                        <div class="mb-3">
                            <label for="add-option-order" class="form-label fw-semibold small text-muted">Display Order (Optional)</label>
                            <input type="number" class="form-control form-control-lg bg-light" id="add-option-order"
                                value="0"  title="Display Order">
                        </div>
                        <div class="mb-4">
                            <label for="add-option-img" class="form-label fw-semibold small text-muted">Upload Shape Image (Max 2MB)</label>
                            <input type="file" class="form-control form-control-lg bg-light" id="add-option-img"
                                accept="image/*" required>
                        </div>
                        <button type="submit" class="btn btn-dark w-100 rounded-pill py-3 fw-bold">Save Option</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    
    <div class="modal fade" id="editOptionModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header border-bottom border-light">
                    <h5 class="modal-title fw-bold">Edit Size Option</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" title="Close" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="editOptionForm">
                        <input type="hidden" id="edit-option-id">
                        <div class="mb-3 text-center">
                            <img loading="lazy" decoding="async" id="edit-option-preview" src="" class="rounded border shadow-sm edit-option-preview-img" alt="Size option shape preview" title="Shape preview">
                        </div>
                        <div class="mb-3">
                            <label for="edit-option-label" class="form-label fw-semibold small text-muted">Label Name / Number</label>
                            <input type="text" class="form-control form-control-lg bg-light" id="edit-option-label"
                                required title="Label Name" >
                        </div>
                        <div class="mb-3">
                            <label for="edit-option-order" class="form-label fw-semibold small text-muted">Display Order</label>
                            <input type="number" class="form-control form-control-lg bg-light" id="edit-option-order"
                                required  title="Display Order">
                        </div>
                        <div class="mb-4">
                            <label for="edit-option-img" class="form-label fw-semibold small text-muted">Update Image (Leave blank to keep
                                current)</label>
                            <input type="file" class="form-control form-control-lg bg-light" id="edit-option-img"
                                accept="image/*">
                        </div>
                        <button type="submit" class="btn btn-primary w-100 rounded-pill py-3 fw-bold">Update
                            Option</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/admin.js"></script>
    <script>
        let sizeOptions = [];

        document.addEventListener('DOMContentLoaded', () => {
            renderAdminLayout();
            if (!checkAdminAuth()) return;
            loadSizeOptions();

            document.getElementById('addOptionForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const formData = new FormData();
                formData.append('label', document.getElementById('add-option-label').value.trim());
                formData.append('display_order', document.getElementById('add-option-order').value || 0);
                formData.append('image', document.getElementById('add-option-img').files[0]);

                try {
                    const res = await adminFetch(`/product-size-options`, {
                        method: 'POST',
                        body: formData
                    });

                    if (res && res.ok) {
                        showToast('Option added successfully', 'success');
                        bootstrap.Modal.getInstance(document.getElementById('addOptionModal')).hide();
                        e.target.reset();
                        loadSizeOptions();
                    } else if (res) {
                        let errMsg = 'Failed to add option';
                        try {
                            const err = await res.json();
                            errMsg = err.message || errMsg;
                        } catch (parseErr) {
                            if (res.status === 413) errMsg = 'File is too large. Maximum size is 5MB.';
                        }
                        showToast(errMsg, 'error');
                    }
                } catch (networkErr) {
                    showToast('Network error during upload', 'error');
                }
            });

            document.getElementById('editOptionForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const id = document.getElementById('edit-option-id').value;
                const formData = new FormData();
                formData.append('label', document.getElementById('edit-option-label').value.trim());
                formData.append('display_order', document.getElementById('edit-option-order').value || 0);

                const imgFile = document.getElementById('edit-option-img').files[0];
                if (imgFile) formData.append('image', imgFile);

                try {
                    const res = await adminFetch(`/product-size-options/${id}`, {
                        method: 'PUT',
                        body: formData
                    });

                    if (res && res.ok) {
                        showToast('Option updated successfully', 'success');
                        bootstrap.Modal.getInstance(document.getElementById('editOptionModal')).hide();
                        e.target.reset();
                        loadSizeOptions();
                    } else if (res) {
                        let errMsg = 'Failed to update';
                        try {
                            const err = await res.json();
                            errMsg = err.message || errMsg;
                        } catch (parseErr) {
                            if (res.status === 413) errMsg = 'File is too large. Maximum size is 5MB.';
                        }
                        showToast(errMsg, 'error');
                    }
                } catch (networkErr) {
                    showToast('Network error during upload', 'error');
                }
            });
        });

        async function loadSizeOptions() {
            const table = document.getElementById('size-options-table');
            const res = await adminFetch(`/product-size-options`, { method: 'GET' });
            const addBtn = document.getElementById('addNewOptionBtn');

            if (!res || !res.ok) {
                table.innerHTML = '<tr><td colspan="4" class="text-center text-danger">Failed to load.</td></tr>';
                return;
            }

            sizeOptions = await res.json();

            // Handle hard limit UI
            if (sizeOptions.length >= 3) {
                addBtn.disabled = true;
                addBtn.innerHTML = '<i class="fas fa-lock me-2"></i> Maximum Reached (3/3)';
                addBtn.classList.replace('btn-dark', 'btn-secondary');
            } else {
                addBtn.disabled = false;
                addBtn.innerHTML = '<i class="fas fa-plus me-2"></i> Add New Option';
                addBtn.classList.replace('btn-secondary', 'btn-dark');
            }

            if (sizeOptions.length === 0) {
                table.innerHTML = '<tr><td colspan="4" class="text-center py-4 text-muted">No size options defined. Click "Add New Option" to start.</td></tr>';
                return;
            }

            table.innerHTML = sizeOptions.map(opt => `
                <tr>
                    <td class="fw-bold">${opt.display_order}</td>
                    <td><img loading="lazy" decoding="async" src="${opt.image_url}" alt="${escapeHTML(opt.label)}" style="width: 50px; height: 70px; object-fit: contain;" class="rounded shadow-sm"></td>
                    <td class="fw-semibold">${escapeHTML(opt.label)}</td>
                    <td class="text-end">
                        <button onclick="openEditModal(${opt.id})" class="btn btn-sm btn-outline-primary rounded-pill px-3 me-2">Edit</button>
                        <button onclick="deleteOption(${opt.id})" class="btn btn-sm btn-outline-danger rounded-pill px-3">Delete</button>
                    </td>
                </tr>
            `).join('');
        }

        function openAddOptionModal() {
            if (sizeOptions.length >= 3) {
                showToast('You can only have up to 3 size options.', 'warning');
                return;
            }
            new bootstrap.Modal(document.getElementById('addOptionModal')).show();
        }

        function openEditModal(id) {
            const opt = sizeOptions.find(o => o.id === id);
            if (!opt) return;

            document.getElementById('edit-option-id').value = opt.id;
            document.getElementById('edit-option-label').value = opt.label;
            document.getElementById('edit-option-order').value = opt.display_order;
            document.getElementById('edit-option-preview').src = opt.image_url;

            new bootstrap.Modal(document.getElementById('editOptionModal')).show();
        }

        async function deleteOption(id) {
            if (!confirm('Are you sure you want to delete this size option?')) return;
            const res = await adminFetch(`/product-size-options/${id}`, { method: 'DELETE' });
            if (res && res.ok) {
                showToast('Option deleted', 'success');
                loadSizeOptions();
            } else {
                showToast('Failed to delete', 'error');
            }
        }
    </script>
</body>

</html>
