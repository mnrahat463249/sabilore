<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0 ">
    <title>SABILORÉ | Coupons</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/admin.css">
    <style>
        .coupon-modal-content { border-radius: 16px; }
    </style>
</head>

<body>
    
    <div id="admin-layout-placeholder"></div>

    
    <div class="admin-main-content p-5">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <div>
                <h2 class="fw-bold mb-1">Coupons &amp; Discounts</h2>
                <p class="text-muted mb-0">Create and manage discount codes for your customers</p>
            </div>
            <button class="btn btn-dark rounded-pill px-4" data-bs-toggle="modal" data-bs-target="#couponModal"
                onclick="openCouponForm()">
                <i class="fas fa-plus me-2"></i>New Coupon
            </button>
        </div>

        
        <div class="row g-3 mb-4" id="coupon-stats">
            <div class="col-md-4">
                <div class="card p-3 border-0 shadow-sm">
                    <small class="text-muted text-uppercase fw-bold">Total Coupons</small>
                    <h3 class="fw-bold mb-0" id="stat-total">—</h3>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-3 border-0 shadow-sm">
                    <small class="text-muted text-uppercase fw-bold">Active</small>
                    <h3 class="fw-bold mb-0 text-success" id="stat-active">—</h3>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-3 border-0 shadow-sm">
                    <small class="text-muted text-uppercase fw-bold">Expired / Inactive</small>
                    <h3 class="fw-bold mb-0 text-muted" id="stat-inactive">—</h3>
                </div>
            </div>
        </div>

        
        <div class="card p-4 border-0 shadow-sm rounded-4">
            <div class="table-responsive">
                <table class="table align-middle">
                    <thead class="bg-light small text-muted">
                        <tr>
                            <th>Code</th>
                            <th>Discount</th>
                            <th>Min Order</th>
                            <th>Uses</th>
                            <th>Expires</th>
                            <th>Status</th>
                            <th class="text-end">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="coupons-tbody">
                        <tr>
                            <td colspan="7" class="text-center py-4"><span
                                    class="spinner-border spinner-border-sm me-2"></span>Loading...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    </div>
    </div>

    
    <div class="modal fade" id="couponModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg coupon-modal-content">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold" id="coupon-modal-title">New Coupon</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close" title="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="coupon-form">
                        <input type="hidden" id="coupon-id">
                        <div class="mb-3">
                            <label class="form-label small fw-bold" for="coupon-code">Coupon Code</label>
                            <input type="text" id="coupon-code" class="form-control text-uppercase"
                                 required title="Coupon Code">
                            <small class="text-muted">Will be auto-uppercased</small>
                        </div>
                        <div class="row g-3 mb-3">
                            <div class="col-6">
                                <label class="form-label small fw-bold" for="coupon-type">Discount Type</label>
                                <select id="coupon-type" class="form-select" title="Discount Type">
                                    <option value="percentage">Percentage (%)</option>
                                    <option value="flat">Flat Amount (BDT)</option>
                                </select>
                            </div>
                            <div class="col-6">
                                <label class="form-label small fw-bold" for="coupon-value">Discount Value</label>
                                <input type="number" id="coupon-value" class="form-control" 
                                    min="0" step="0.01" required title="Discount Value">
                            </div>
                        </div>
                        <div class="row g-3 mb-3">
                            <div class="col-6">
                                <label class="form-label small fw-bold" for="coupon-min">Min Order (BDT)</label>
                                <input type="number" id="coupon-min" class="form-control" 
                                    min="0" title="Min Order">
                            </div>
                            <div class="col-6">
                                <label class="form-label small fw-bold" for="coupon-max-uses">Max Uses</label>
                                <input type="number" id="coupon-max-uses" class="form-control"
                                     min="1" title="Max Uses">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold" for="coupon-expires">Expiry Date</label>
                            <input type="datetime-local" id="coupon-expires" class="form-control" title="Expiry Date" >
                        </div>
                        <button type="submit" id="coupon-submit-btn" class="btn btn-dark w-100 rounded-pill py-2">
                            <i class="fas fa-save me-2"></i>Save Coupon
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/admin.js"></script>
    <script>
        let allCoupons = [];

        document.addEventListener('DOMContentLoaded', () => {
            renderAdminLayout();
            checkAdminAuth();
            loadCoupons();
        });

        async function loadCoupons() {
            const tbody = document.getElementById('coupons-tbody');
            const res = await adminFetch(`${ADMIN_API_URL}/coupons`);
            if (!res) return;
            allCoupons = await res.json();

            // Stats
            const now = new Date();
            const active = allCoupons.filter(c => c.is_active && (!c.expires_at || new Date(c.expires_at) > now));
            document.getElementById('stat-total').textContent = allCoupons.length;
            document.getElementById('stat-active').textContent = active.length;
            document.getElementById('stat-inactive').textContent = allCoupons.length - active.length;

            if (allCoupons.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="text-center py-5 text-muted"><i class="fas fa-ticket-alt fa-2x mb-3 d-block opacity-25"></i>No coupons yet. Create your first one!</td></tr>';
                return;
            }

            tbody.innerHTML = allCoupons.map(c => {
                const expired = c.expires_at && new Date(c.expires_at) < now;
                const isActive = c.is_active && !expired;
                const discountLabel = c.discount_type === 'percentage' ? `${c.discount_value}%` : `${Number(c.discount_value).toLocaleString()} BDT`;
                const expiryLabel = c.expires_at ? new Date(c.expires_at).toLocaleDateString() : '—';
                const usageLabel = c.max_uses ? `${c.used_count}/${c.max_uses}` : c.used_count;
                return `
                <tr>
                    <td>
                        <div class="d-flex align-items-center gap-2">
                            <code class="bg-light px-2 py-1 rounded fw-bold">${c.code}</code>
                            <button class="btn btn-sm btn-link p-0 text-muted" onclick="copyCode('${c.code}')" title="Copy"><i class="fas fa-copy fa-xs"></i></button>
                        </div>
                    </td>
                    <td class="fw-semibold text-primary">${discountLabel}</td>
                    <td>${c.min_order_value > 0 ? Number(c.min_order_value).toLocaleString() + ' BDT' : 'None'}</td>
                    <td><span class="badge bg-light text-dark border rounded-pill px-3">${usageLabel}</span></td>
                    <td class="${expired ? 'text-danger' : 'text-muted'} small">${expiryLabel}${expired ? ' <i class="fas fa-exclamation-circle"></i>' : ''}</td>
                    <td>
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" ${isActive ? 'checked' : ''} onchange="toggleCoupon(${c.id}, this.checked, ${JSON.stringify(c).replaceAll('"', '&quot;')})">
                        </div>
                    </td>
                    <td class="text-end">
                        <button class="btn btn-sm btn-outline-primary rounded-pill px-3 me-1" onclick="editCoupon(${c.id})"><i class="fas fa-edit me-1"></i>Edit</button>
                        <button class="btn btn-sm btn-outline-danger rounded-pill px-3" onclick="deleteCouponById(${c.id})"><i class="fas fa-trash me-1"></i></button>
                    </td>
                </tr>`;
            }).join('');
        }

        function openCouponForm() {
            document.getElementById('coupon-id').value = '';
            document.getElementById('coupon-form').reset();
            document.getElementById('coupon-modal-title').textContent = 'New Coupon';
            document.getElementById('coupon-code').disabled = false;
        }

        function editCoupon(id) {
            const c = allCoupons.find(x => x.id === id);
            if (!c) return;
            document.getElementById('coupon-id').value = c.id;
            document.getElementById('coupon-code').value = c.code;
            document.getElementById('coupon-code').disabled = true;
            document.getElementById('coupon-type').value = c.discount_type;
            document.getElementById('coupon-value').value = c.discount_value;
            document.getElementById('coupon-min').value = c.min_order_value || '';
            document.getElementById('coupon-max-uses').value = c.max_uses || '';
            document.getElementById('coupon-expires').value = c.expires_at ? c.expires_at.slice(0, 16) : '';
            document.getElementById('coupon-modal-title').textContent = 'Edit Coupon';
            new bootstrap.Modal(document.getElementById('couponModal')).show();
        }

        document.getElementById('coupon-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('coupon-id').value;
            const btn = document.getElementById('coupon-submit-btn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Saving...';

            const payload = {
                code: document.getElementById('coupon-code').value,
                discount_type: document.getElementById('coupon-type').value,
                discount_value: document.getElementById('coupon-value').value,
                min_order_value: document.getElementById('coupon-min').value || 0,
                max_uses: document.getElementById('coupon-max-uses').value || null,
                expires_at: document.getElementById('coupon-expires').value || null
            };

            const res = id
                ? await adminFetch(`${ADMIN_API_URL}/coupons/${id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) })
                : await adminFetch(`${ADMIN_API_URL}/coupons`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });

            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-save me-2"></i>Save Coupon';

            if (res && res.ok) {
                showToast(id ? 'Coupon updated!' : 'Coupon created!', 'success');
                bootstrap.Modal.getInstance(document.getElementById('couponModal')).hide();
                loadCoupons();
            } else if (res) {
                const err = await res.json();
                showToast(err.message || 'Error saving coupon', 'error');
            }
        });

        async function toggleCoupon(id, isActive, coupon) {
            const res = await adminFetch(`${ADMIN_API_URL}/coupons/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ...coupon, is_active: isActive ? 1 : 0 })
            });
            if (res && res.ok) {
                showToast(`Coupon ${isActive ? 'activated' : 'deactivated'}`, 'success');
                loadCoupons();
            } else {
                showToast('Failed to update coupon status', 'error');
            }
        }

        async function deleteCouponById(id) {
            if (!confirm('Delete this coupon? This cannot be undone.')) return;
            const res = await adminFetch(`${ADMIN_API_URL}/coupons/${id}`, { method: 'DELETE' });
            if (res && res.ok) {
                showToast('Coupon deleted.', 'success');
                loadCoupons();
            } else {
                showToast('Failed to delete coupon.', 'error');
            }
        }

        function copyCode(code) {
            navigator.clipboard.writeText(code).then(() => showToast(`Copied: ${code}`, 'info'));
        }
    </script>
</body>

</html>
