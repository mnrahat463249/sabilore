<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0 ">
    <title>SABILORÉ | Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/admin.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
</head>

<body>
    
    <div id="admin-layout-placeholder"></div>

    
    <div class="admin-main-content p-5">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <div>
                <h2 class="fw-bold mb-1">Dashboard</h2>
                <p class="text-muted mb-0 welcome-admin-name">Welcome, Admin</p>
            </div>
            <div class="d-flex align-items-center gap-3">
                <span class="text-muted small" id="current-date"></span>
            </div>
        </div>

        
        <div class="row g-4 mb-5">
            <div class="col-md-4">
                <div class="card p-4 h-100">
                    <div class="d-flex align-items-center gap-3">
                        <div class="stat-icon bg-primary bg-opacity-10 text-primary">
                            <i class="fas fa-shopping-bag"></i>
                        </div>
                        <div>
                            <small class="text-muted text-uppercase fw-bold d-block mb-1 stat-card-title">Daily Orders</small>
                            <h3 id="daily-orders" class="card-title-premium mb-0 fs-4">0</h3>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card p-4 h-100">
                    <div class="d-flex align-items-center gap-3">
                        <div class="stat-icon bg-info bg-opacity-10 text-info">
                            <i class="fas fa-user-plus"></i>
                        </div>
                        <div>
                            <small class="text-muted text-uppercase fw-bold d-block mb-1 stat-card-title">New Customers</small>
                            <h3 id="new-customers" class="card-title-premium mb-0 fs-4">0</h3>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-4 h-100">
                    <div class="d-flex align-items-center gap-3">
                        <div class="stat-icon bg-warning bg-opacity-10 text-warning">
                            <i class="fas fa-clock"></i>
                        </div>
                        <div>
                            <small class="text-muted text-uppercase fw-bold d-block mb-1 stat-card-title">Pending Actions</small>
                            <h3 id="pending-orders" class="card-title-premium mb-0 fs-4 text-warning">0</h3>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        
        <div class="row g-4 mb-5">
            <div class="col-lg-6 mx-auto">
                <div class="card p-4 h-100 chart-card-3d">
                    <h5 class="card-title-premium mb-4 text-center">Order Status</h5>
                    <div class="chart-container">
                        <canvas id="statusChart"></canvas>
                    </div>
                    <div id="statusLegend" class="mt-3 small d-flex flex-wrap gap-2 justify-content-center"></div>
                </div>
            </div>
        </div>

        
        <div class="card p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h5 class="fw-bold mb-0">Recent Orders</h5>
                <a href="orders" class="btn btn-outline-primary btn-sm rounded-pill px-3">View All</a>
            </div>
            <div class="table-responsive">
                <table class="table align-middle">
                    <thead class="text-muted small bg-light">
                        <tr>
                            <th>Order ID</th>
                            <th>Customer</th>
                            <th>Status</th>
                            <th>Amount</th>
                            <th>Date</th>
                        </tr>
                    </thead>
                    <tbody id="admin-orders-table">
                        <tr>
                            <td colspan="5" class="text-center text-muted py-4"><span
                                    class="spinner-border spinner-border-sm me-2"></span>Loading...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/admin.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            renderAdminLayout();
            document.getElementById('current-date').textContent = new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            initDashboard();
        });
    </script>
</body>

</html>
