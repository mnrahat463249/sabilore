<style>
    
    .sale-hero-banner {
        background: #ffffff;

        text-align: center;
        position: relative;
        overflow: hidden;
        border-bottom: 1px solid #eee;
    }

    .price-display-box {

<div class="container py-5">
    <div class="row position-relative">

        
        <div class="col-lg-2 filter-sidebar-sticky pe-lg-4">
            <div class="glass-filter-card">
                
                <div class="mb-5">
                    <label class="filter-label-stark mb-3" for="sale-search">Search</label>
                    <input type="text" id="sale-search" class="form-control search-input-stark"  autocomplete="off">
                </div>

                
                <div class="mb-5">
                    <div class="filter-section-header">
                        <label class="filter-label-stark" for="sale-category">Category</label>
                        <a href="javascript:void(0)" class="filter-clear-link" id="clear-category" onclick="clearFilter('category')">Clear</a>
                    </div>
                    <select id="sale-category" class="form-select border-0 border-bottom shadow-none px-0 filter-select-stark"
                        aria-label="Select Category" title="Select Category">
                        <option value="">All Collections</option>
                    </select>
                </div>

                
                <div class="mb-5">
                    <label class="filter-label-stark mb-3" for="sale-price-range">Price Range</label>
                    <div class="price-range-wrapper">
                        <input type="range" id="sale-price-range" class="form-range" min="0" max="10000" step="500" value="10000"
                            aria-label="Price range filter" title="Price range">
                        <div class="price-display-box" id="sale-price-value">UP TO 10k BDT</div>
                    </div>
                </div>

                
                <div class="mb-5">
                    <div class="filter-section-header">
                        <label class="filter-label-stark" for="sale-size-filter">Size</label>
                        <a href="javascript:void(0)" class="filter-clear-link" id="clear-size" onclick="clearFilter('size')">Clear</a>

                </div>

                
                <div class="mb-5">
                    <label class="filter-label-stark mb-3" for="sale-sort">Sort By</label>
                    <select id="sale-sort" class="form-select border-0 border-bottom shadow-none px-0 filter-select-stark"
                        aria-label="Sort products" title="Sort options">
                        <option value="discount">BIGGEST DISCOUNT</option>
                        <option value="latest">LATEST FIRST</option>
                        <option value="low">PRICE: LOW TO HIGH</option>
                        <option value="high">PRICE: HIGH TO LOW</option>
                    </select>
                </div>

                <button class="btn btn-dark w-100 py-3 text-uppercase small fw-bold btn-letter-spacing-wide" onclick="resetSaleFilters()">
                    Reset Filters
                </button>
            </div>
        </div>

        
        <div class="mobile-filter-bar">
            <button class="btn-filter-mobile" onclick="toggleSaleMobileFilter()">
                <i class="fas fa-sliders-h"></i> Filters
            </button>
        </div>

        <div class="shop-filter-overlay" id="saleFilterOverlay" onclick="toggleSaleMobileFilter()"></div>

        <div id="sale-mobile-filter-drawer" class="filter-drawer-mobile">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="filter-label-stark m-0 modal-header-title">Filters</h3>
                <button class="btn-close" onclick="toggleSaleMobileFilter()" aria-label="Close filters" title="Close"></button>
            </div>
            <div id="sale-mobile-filter-content"></div>
            <div class="mt-5 pt-4 border-top">
                <button class="btn btn-dark w-100 rounded-0 py-3 text-uppercase small fw-bold" onclick="toggleSaleMobileFilter()">Show Products</button>
            </div>

        <div class="col-lg-10">
            <div class="d-flex justify-content-between align-items-center mb-4">

                        🔥 Season End Sale
                    </h2>

                </div>
            </div>

            <div id="sale-products-row" class="row g-2">
                <div class="col-12 text-center py-5">
                    <div class="spinner-border sale-spinner"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const selectedSizes = new Set();
    let allSaleProducts = [];
    let nearestSaleEnd = null;

    document.addEventListener('DOMContentLoaded', async () => {
        // Mobile filter drawer toggle
        window.toggleSaleMobileFilter = function() {
            const drawer = document.getElementById('sale-mobile-filter-drawer');
            const overlay = document.getElementById('saleFilterOverlay');
            const desktopCard = document.querySelector('.glass-filter-card');
            const mobileContent = document.getElementById('sale-mobile-filter-content');

            if (drawer.classList.contains('active')) {
                drawer.classList.remove('active');
                overlay.classList.remove('active');
                document.body.style.overflow = '';
                document.querySelector('.filter-sidebar-sticky').appendChild(desktopCard);
            } else {
                mobileContent.innerHTML = '';
                mobileContent.appendChild(desktopCard);
                drawer.classList.add('active');
                overlay.classList.add('active');
                document.body.style.overflow = 'hidden';
            }
        };

        // Price range
        document.getElementById('sale-price-range').addEventListener('input', (e) => {
            const val = e.target.value;
            document.getElementById('sale-price-value').textContent = (val >= 1000) ? 'UP TO ' + (val / 1000) + 'k BDT' : 'UP TO ' + val + ' BDT';
            filterSaleProducts();
        });

        // Search
        document.getElementById('sale-search').addEventListener('input', () => filterSaleProducts());

        // Sort
        document.getElementById('sale-sort').addEventListener('change', () => filterSaleProducts());

        // Category
        document.getElementById('sale-category').addEventListener('change', () => {
            const clearBtn = document.getElementById('clear-category');
            if (clearBtn) clearBtn.classList.toggle('visible', !!document.getElementById('sale-category').value);
            filterSaleProducts();
        });

        // Load categories
        try {
            const categories = await window.SABILORE_UTILS.getCategories();
            const catSel = document.getElementById('sale-category');
            categories.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c.name.toLowerCase();
                opt.textContent = c.name;
                catSel.appendChild(opt);
            });
        } catch(e) {}

        // Build size chips
        buildSizeChips();

        // Load sale products
        await loadSaleProducts();
    });

    function buildSizeChips() {
        const container = document.getElementById('sale-size-chips');
        if (!container) return;
        ['S','M','L','XL','XXL'].forEach(s => {
            const chip = document.createElement('div');
            chip.className = `filter-chip-stark ${selectedSizes.has(s) ? 'active' : ''}`;
            chip.textContent = s;
            chip.onclick = () => {
                if (selectedSizes.has(s)) { selectedSizes.delete(s); chip.classList.remove('active'); }
                else { selectedSizes.add(s); chip.classList.add('active'); }
                document.getElementById('sale-size-filter').value = Array.from(selectedSizes).join(',');
                const clearBtn = document.getElementById('clear-size');
                if (clearBtn) clearBtn.classList.toggle('visible', selectedSizes.size > 0);
                filterSaleProducts();
            };
            container.appendChild(chip);
        });
    }

    window.clearFilter = function(type) {
        if (type === 'category') {
            document.getElementById('sale-category').value = '';
            document.getElementById('clear-category').classList.remove('visible');
        } else if (type === 'size') {
            selectedSizes.clear();
            document.querySelectorAll('#sale-size-chips .filter-chip-stark').forEach(el => el.classList.remove('active'));
            document.getElementById('sale-size-filter').value = '';
            document.getElementById('clear-size').classList.remove('visible');
        }
        filterSaleProducts();
    };

    window.resetSaleFilters = function() {
        document.getElementById('sale-search').value = '';
        document.getElementById('sale-category').value = '';
        document.getElementById('sale-price-range').value = 10000;
        document.getElementById('sale-price-value').textContent = 'UP TO 10k BDT';
        document.getElementById('sale-size-filter').value = '';
        document.getElementById('sale-sort').value = 'discount';
        selectedSizes.clear();
        document.querySelectorAll('#sale-size-chips .filter-chip-stark').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.filter-clear-link').forEach(el => el.classList.remove('visible'));
        filterSaleProducts();
    };

    async function loadSaleProducts() {
        const row = document.getElementById('sale-products-row');
        try {
            const apiBase = window.API_URL || '/api';
            const res = await fetch(`${apiBase}/products/season-end-sale`);
            if (!res.ok) throw new Error('API error');
            allSaleProducts = await res.json();

            // Find nearest sale_end for countdown
            const withEnd = allSaleProducts.filter(p => p.sale_end);
            if (withEnd.length > 0) {
                withEnd.sort((a, b) => new Date(a.sale_end) - new Date(b.sale_end));
                nearestSaleEnd = new Date(withEnd[0].sale_end);
                startCountdown(nearestSaleEnd);
                document.getElementById('cd-end-label').textContent = `Sale ends: ${nearestSaleEnd.toLocaleDateString('en-US', {day:'numeric', month:'long', year:'numeric'})}`;
            } else {
                document.getElementById('sale-countdown').style.display = 'none';
            }

            filterSaleProducts();
        } catch(e) {
            row.innerHTML = `<div class="col-12 sale-empty-state"><i class="fas fa-tag fa-3x mb-4 opacity-25"></i><h4 class="fw-bold">No sale products found</h4><p>Check back soon for exclusive season-end deals.</p><a href="/shop" class="btn btn-dark btn-rect px-5 mt-3">Browse All Products</a></div>`;
        }
    }

    function filterSaleProducts() {
        const row = document.getElementById('sale-products-row');
        const searchTerm = document.getElementById('sale-search')?.value.toLowerCase() || '';
        const maxPrice = parseInt(document.getElementById('sale-price-range')?.value || 10000);
        const cat = document.getElementById('sale-category')?.value.toLowerCase() || '';
        const sizes = (document.getElementById('sale-size-filter')?.value || '').split(',').filter(Boolean);
        const sortBy = document.getElementById('sale-sort')?.value || 'discount';

        let filtered = [...allSaleProducts];

        if (searchTerm) filtered = filtered.filter(p => (p.name + ' ' + (p.tags || '')).toLowerCase().includes(searchTerm));
        filtered = filtered.filter(p => Number(p.sale_price || p.price) <= maxPrice);
        if (cat) filtered = filtered.filter(p => p.category_name?.toLowerCase().includes(cat) || (p.tags || '').toLowerCase().includes(cat));
        if (sizes.length > 0) {
            filtered = filtered.filter(p => {
                if (!p.available_sizes) return false;
                const pSizes = p.available_sizes.split(',').map(s => s.trim());
                return sizes.some(s => pSizes.includes(s));
            });
        }

        // Sort
        if (sortBy === 'discount') {
            filtered.sort((a, b) => {
                const discA = a.sale_price ? ((a.price - a.sale_price) / a.price * 100) : (a.discount_percentage || 0);
                const discB = b.sale_price ? ((b.price - b.sale_price) / b.price * 100) : (b.discount_percentage || 0);
                return discB - discA;
            });
        } else if (sortBy === 'low') {
            filtered.sort((a, b) => Number(a.sale_price || a.price) - Number(b.sale_price || b.price));
        } else if (sortBy === 'high') {
            filtered.sort((a, b) => Number(b.sale_price || b.price) - Number(a.sale_price || a.price));
        } else {
            filtered.sort((a, b) => (b.id || 0) - (a.id || 0));
        }

        const countLabel = document.getElementById('sale-count-label');
        if (countLabel) countLabel.textContent = `${filtered.length} product${filtered.length !== 1 ? 's' : ''} on sale`;

        if (filtered.length === 0) {
            row.innerHTML = `<div class="col-12 sale-empty-state"><i class="fas fa-search fa-3x mb-4 opacity-25"></i><h4 class="fw-bold">No results</h4><p>Try adjusting your filters.</p><button class="btn btn-dark mt-3" onclick="resetSaleFilters()">Clear Filters</button></div>`;
            return;
        }

        row.innerHTML = filtered.map((product, i) => {
            const card = SABILORE_UTILS.renderProductCard(product, undefined, { staggerIndex: (i % 6) + 1 });
            // Inject SALE badge into card
            return card.replace('<div class="asos-card-img-wrap position-relative">', `<div class="asos-card-img-wrap position-relative"><div class="sale-card-badge">SALE</div>`);
        }).join('');

        if (typeof refreshScrollReveal === 'function') refreshScrollReveal();
    }

    // Countdown Timer
    let countdownInterval = null;
    function startCountdown(endDate) {
        function tick() {
            const now = new Date();
            const diff = endDate - now;
            if (diff <= 0) {
                clearInterval(countdownInterval);
                document.getElementById('sale-countdown').innerHTML = '<div style="color:#ff4d00;font-size:1rem;font-weight:700;letter-spacing:0.1em;">SALE ENDED</div>';
                return;
            }
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const secs = Math.floor((diff % (1000 * 60)) / 1000);
            const pad = n => String(n).padStart(2, '0');
            document.getElementById('cd-days').textContent = pad(days);
            document.getElementById('cd-hours').textContent = pad(hours);
            document.getElementById('cd-mins').textContent = pad(mins);
            document.getElementById('cd-secs').textContent = pad(secs);
        }
        tick();
        countdownInterval = setInterval(tick, 1000);
    }
</script>
