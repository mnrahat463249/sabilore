<style>
    
    .filter-sidebar-sticky {
        position: sticky;
        top: 100px;
        z-index: 10;
        transition: all 0.3s ease;
    }

    .glass-filter-card {
        background: var(--card-bg);
        border: 1px solid var(--border-color);
        border-radius: 2px;
        
        padding: 30px 25px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.03);
        -webkit-backdrop-filter: blur(15px);
        backdrop-filter: blur(15px);
    }

    .filter-card-padding { padding: 20px 15px; }
    .select-stark { border-bottom: 2px solid var(--border-color) !important; font-size: 0.85rem; color: var(--text-main); background-color: transparent; font-weight: 600; }
    .drawer-title { font-size: 1rem; }
    .shop-main-title { font-size: 1.5rem; color: var(--text-main); }
    .shop-sub-title { letter-spacing: 0.05em; font-size: 0.7rem; }
    .btn-find-fit { font-size: 0.7rem; letter-spacing: 0.1em; }

    .filter-section-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 15px;
    }

    .filter-label-stark {
        font-size: 0.7rem;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.15em;
        color: var(--secondary);
        margin: 0;
    }

    .filter-clear-link {
        font-size: 0.6rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--primary);
        text-decoration: none;
        font-weight: 700;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s;
    }

    .filter-clear-link.visible {
        opacity: 1;
        pointer-events: auto;
    }

    .filter-clear-link:hover {
        text-decoration: underline;
    }

    
    .search-input-stark {
        background: transparent !important;
        border: none !important;
        border-bottom: 2px solid var(--border-color) !important;
        border-radius: 0 !important;
        padding: 12px 0 !important;
        font-size: 0.85rem !important;
        font-weight: 500;
        transition: border-color 0.3s ease;
        color: var(--text-main) !important;
    }

    .search-input-stark:focus {
        border-bottom-color: var(--primary) !important;
        box-shadow: none !important;
    }

    
    .price-range-wrapper {
        padding: 10px 0;
    }

    .price-display-box {
        background: #fcfcfc;
        border: 1px solid #eee;
        padding: 8px 12px;
        text-align: center;
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 0.05em;
        margin-top: 15px;
    }

    html[data-theme='dark'] .price-display-box {
        background: #1a1a1a;
        border-color: #333;
    }

    
    .filter-chip-stark {
        padding: 8px 12px;
        border: 1px solid #eee;
        background: #fff;
        font-size: 0.7rem;
        font-weight: 800;
        text-transform: uppercase;
        cursor: pointer;
        transition: all 0.2s cubic-bezier(0.165, 0.84, 0.44, 1);
        min-width: 45px;
        text-align: center;
        color: #999;
    }

    .filter-chip-stark:hover {
        border-color: #000;
        color: #000;
    }

    .filter-chip-stark.active {
        background: #000;
        border-color: #000;
        color: #fff;
    }

    html[data-theme='dark'] .filter-chip-stark {
        background: #111;
        border-color: #333;
        color: #666;
    }

    html[data-theme='dark'] .filter-chip-stark.active {
        background: var(--primary);
        border-color: var(--primary);
        color: #fff;
    }

    
    .filter-swatch-stark {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        padding: 3px;
        border: 1px solid transparent;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .filter-swatch-stark:hover {
        transform: scale(1.1);
    }

    .filter-swatch-stark.active {
        border-color: #000;
    }

    html[data-theme='dark'] .filter-swatch-stark.active {
        border-color: var(--primary);
    }

    .swatch-inner-circle {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        border: 1px solid rgba(0, 0, 0, 0.05);
    }

    
    .mobile-filter-bar {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 1000;
        display: none;
    }

    .btn-filter-mobile {
        background: #000;
        color: #fff;
        border: none;
        padding: 12px 25px;
        border-radius: 50px;
        font-weight: 800;
        text-transform: uppercase;
        font-size: 0.75rem;
        letter-spacing: 0.15em;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .filter-drawer-mobile {
        position: fixed;
        inset: auto 0 0 0;
        max-height: 85vh;
        background: var(--bg-body);
        z-index: 1100;
        transform: translateY(100%);
        transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        overflow-y: auto;
        padding: 30px 25px;
        border-top-left-radius: 24px;
        border-top-right-radius: 24px;
        box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.1);
    }

    .shop-filter-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.4);
        z-index: 1099;
        -webkit-backdrop-filter: blur(2px);
        backdrop-filter: blur(2px);
    }

    .shop-filter-overlay.active {
        display: block;
    }

    .filter-drawer-mobile.active {
        transform: translateY(0);
    }

    .filter-drawer-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 40px;
    }

    @media (max-width: 991px) {
        .filter-sidebar-sticky {
            display: none;
        }

        .mobile-filter-bar {
            display: block;
        }
    }

    
    .shop-card-sizes-overlay {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        background: rgba(255, 255, 255, 0.95);
        color: #000;
        font-size: 0.65rem;
        padding: 10px;
        text-align: center;
        opacity: 0;
        transform: translateY(100%);
        transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
        pointer-events: none;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        font-weight: 700;
    }

    .asos-card-img-wrap:hover .shop-card-sizes-overlay {
        opacity: 1;
        transform: translateY(0);
    }

    .shop-color-swatch {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        border: 1px solid rgba(0, 0, 0, 0.15);
        display: inline-block;
        flex-shrink: 0;
    }
</style>
<div class="container py-5">
    <div class="row position-relative">
        
        <div class="col-lg-2 filter-sidebar-sticky pe-lg-4">
            <div class="glass-filter-card filter-card-padding">
                <div class="mb-5 search-suggestions-wrap">
                    <label class="filter-label-stark mb-3" for="product-search">Search</label>
                    <input type="text" id="product-search" class="form-control search-input-stark"
                         autocomplete="off" title="Search products">
                    <div id="search-suggestions" class="search-suggestions-list"></div>
                </div>

                
                <div class="mb-5">
                    <div class="filter-section-header">
                        <label class="filter-label-stark" for="category-filter">Category</label>
                        <a href="javascript:void(0)" class="filter-clear-link" id="clear-category"
                            onclick="clearSpecificFilter('category')">Clear</a>
                    </div>
                    <select id="category-filter" class="form-select border-0 border-bottom shadow-none px-0 select-stark" title="Category">
                        <option value="">All Collections</option>
                    </select>
                </div>

                <div class="mb-5">
                    <div class="filter-section-header">
                        <label class="filter-label-stark" for="price-range">Price Range</label>
                    </div>
                    <div class="price-range-wrapper">
                        <input type="range" id="price-range" class="form-range" min="0" max="10000" step="500"
                            value="10000" title="Price Range" >
                        <div class="price-display-box" id="price-value">
                            UP TO 10k BDT
                        </div>
                    </div>
                </div>

                
                <div class="mb-5">
                    <div class="filter-section-header">
                        <label class="filter-label-stark">Size</label>
                        <a href="javascript:void(0)" class="filter-clear-link" id="clear-size"
                            onclick="clearSpecificFilter('size')">Clear</a>
                    </div>
                    <div id="size-chips-container" class="d-flex flex-wrap gap-2 mt-2">
                        
                    </div>
                    <input type="hidden" id="size-filter" value="">
                </div>

                <div class="mb-5">
                    <label class="filter-label-stark mb-3" for="sort-by">Sort By</label>
                    <select id="sort-by" class="form-select border-0 border-bottom shadow-none px-0 select-stark" title="Sort By">
                        <option value="latest">LATEST ARRIVALS</option>
                        <option value="bestselling">BEST SELLING</option>
                        <option value="low">PRICE: LOW TO HIGH</option>
                        <option value="high">PRICE: HIGH TO LOW</option>
                    </select>
                </div>

                <button class="btn btn-dark w-100 py-3 text-uppercase small fw-bold tracking-widest"
                    onclick="resetFilters()">
                    Reset All Filters
                </button>
            </div>
        </div>

        
        <div class="mobile-filter-bar">
            <button class="btn-filter-mobile" onclick="toggleMobileFilterDrawer()">
                <i class="fas fa-sliders-h"></i>
                Filters
            </button>
        </div>

        <div class="shop-filter-overlay" id="shopFilterOverlay" onclick="toggleMobileFilterDrawer()"></div>

        <div id="mobile-filter-drawer" class="filter-drawer-mobile">
            <div class="filter-drawer-header">
                <h3 class="filter-label-stark m-0 drawer-title">Filters</h3>
                <button class="btn-close" onclick="toggleMobileFilterDrawer()" title="Close Filters"></button>
            </div>

            <div id="mobile-filter-content">
                
            </div>

            <div class="mt-5 pt-4 border-top">
                <button class="btn btn-dark w-100 rounded-0 py-3 text-uppercase small fw-bold tracking-widest"
                    onclick="toggleMobileFilterDrawer()">
                    Show Products
                </button>
            </div>
        </div>

        
        <div class="col-lg-10">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h1 id="shop-title" class="text-uppercase tracking-wider fw-light shop-main-title">New
                        Arrivals</h1>
                    <span id="shop-subtitle" class="theme-text-muted small text-uppercase shop-sub-title">Showing the latest premium
                        additions</span>
                </div>
                <div class="d-flex align-items-center gap-2">
                    <button class="btn btn-sm btn-outline-dark btn-rect text-uppercase small px-3 py-2 btn-find-fit"
                        onclick="openSizeRecommender()" title="Find My Fit">
                        Find My Fit
                    </button>
                </div>
            </div>

            <div id="shop-products-row" class="row g-2">
                
            </div>
        </div>
    </div>
</div>

<script>
    // Use global window.API_URL and window.BASE_URL from main.js
    const URL_CAT = "{{url_cat}}";
    let allProducts = [];
    let searchInput, suggestionsBox;
    let searchDebounce;

    // Filter Selection State
    const selectedSizes = new Set();

    document.addEventListener('DOMContentLoaded', () => {
        window.toggleMobileFilterDrawer = function () {
            const drawer = document.getElementById('mobile-filter-drawer');
            const desktopCard = document.querySelector('.glass-filter-card');
            const mobileContent = document.getElementById('mobile-filter-content');
            const overlay = document.getElementById('shopFilterOverlay');

            if (drawer.classList.contains('active')) {
                drawer.classList.remove('active');
                if (overlay) overlay.classList.remove('active');
                document.body.style.overflow = '';
                // Move back to desktop sidebar
                document.querySelector('.filter-sidebar-sticky').appendChild(desktopCard);
            } else {
                // Move card to mobile drawer
                mobileContent.innerHTML = '';
                mobileContent.appendChild(desktopCard);
                drawer.classList.add('active');
                if (overlay) overlay.classList.add('active');
                document.body.style.overflow = 'hidden';
            }
        };

        // Price range display update
        const priceRange = document.getElementById('price-range');
        const priceValue = document.getElementById('price-value');
        if (priceRange && priceValue) {
            priceRange.addEventListener('input', (e) => {
                const val = e.target.value;
                priceValue.textContent = (val >= 1000) ? 'UP TO ' + (val / 1000) + 'k BDT' : 'UP TO ' + val + ' BDT';
                filterProducts();
            });
        }

        // Search filter & Suggestions
        searchInput = document.getElementById('product-search');
        suggestionsBox = document.getElementById('search-suggestions');

        if (searchInput) {
            searchInput.addEventListener('input', (e) => {
                const val = e.target.value.trim();
                clearTimeout(searchDebounce);

                if (val.length < 1) {
                    if (suggestionsBox) suggestionsBox.style.display = 'none';
                    filterProducts();
                    return;
                }

                searchDebounce = setTimeout(async () => {
                    try {
                        const res = await fetch(`${API_URL}/products/suggestions?q=${encodeURIComponent(val)}`);
                        const data = await res.json();

                        if (suggestionsBox) {
                            if (data.length > 0) {
                                suggestionsBox.innerHTML = data.map(item => `
                                    <div class="suggestion-item" onclick="applySuggestion('${item.name.replace(/'/g, "\\'")}', '${item.type}')">
                                        <span>${item.name}</span>
                                        <span class="suggestion-type">${item.type}</span>
                                    </div>
                                `).join('');
                                suggestionsBox.style.display = 'block';
                            } else {
                                suggestionsBox.style.display = 'none';
                            }
                        }
                    } catch (e) {
                        console.error('Suggestion error:', e);
                    }
                    filterProducts();
                }, 300);
            });

            // Close suggestions on click outside
            document.addEventListener('click', (e) => {
                if (suggestionsBox && !searchInput.contains(e.target) && !suggestionsBox.contains(e.target)) {
                    suggestionsBox.style.display = 'none';
                }
            });
        }

        // Sort filter  
        const sortSelect = document.getElementById('sort-by');
        if (sortSelect) {
            sortSelect.addEventListener('change', () => filterProducts());
        }

        // Load categories into filter dropdown
        loadCategoryFilter();

        // Load products
        loadShopProducts();
    });

    async function loadCategoryFilter() {
        try {
            const categories = await window.SABILORE_UTILS.getCategories();
            const catFilter = document.getElementById('category-filter');
            if (!catFilter) return;

            categories.forEach(cat => {
                const opt = document.createElement('option');
                opt.value = cat.name.toLowerCase();
                opt.textContent = cat.name;
                const cleanURLCat = (URL_CAT && URL_CAT !== '{{url_cat}}') ? URL_CAT.toLowerCase() : '';
                if (cleanURLCat && cat.name.toLowerCase() === cleanURLCat) {
                    opt.selected = true;
                }
                catFilter.appendChild(opt);
            });
        } catch (e) {
            console.error('Failed to load category filter:', e);
        }
    }

    // --- Filter Handlers ---

    window.toggleSizeFilter = (size, element) => {
        const sizeInput = document.getElementById('size-filter');
        const clearBtn = document.getElementById('clear-size');
        if (selectedSizes.has(size)) {
            selectedSizes.delete(size);
            element.classList.remove('active');
        } else {
            selectedSizes.add(size);
            element.classList.add('active');
        }
        if (sizeInput) sizeInput.value = Array.from(selectedSizes).join(',');
        if (clearBtn) clearBtn.classList.toggle('visible', selectedSizes.size > 0);
        filterProducts();
    };

    window.clearSpecificFilter = (type) => {
        if (type === 'category') {
            document.getElementById('category-filter').value = '';
            document.getElementById('clear-category').classList.remove('visible');
        } else if (type === 'size') {
            selectedSizes.clear();
            document.querySelectorAll('#size-chips-container .filter-chip-stark').forEach(el => el.classList.remove('active'));
            document.getElementById('size-filter').value = '';
            document.getElementById('clear-size').classList.remove('visible');
        }
        filterProducts();
    };

    // --- Search Suggestion Apply ---

    window.applySuggestion = (name, type) => {
        const searchInput = document.getElementById('product-search');
        const catFilter = document.getElementById('category-filter');

        if (type === 'category') {
            const selected = name.toLowerCase();
            catFilter.value = selected;
            searchInput.value = '';

            // Trigger category load and URL update
            window.history.replaceState({}, '', `/shop/${encodeURIComponent(selected)}`);
            loadShopProducts(selected);
        } else {
            searchInput.value = name;
            filterProducts();
        }

        if (suggestionsBox) suggestionsBox.style.display = 'none';
    };

    window.resetFilters = () => {
        const searchInput = document.getElementById('product-search');
        const catFilter = document.getElementById('category-filter');
        const priceRange = document.getElementById('price-range');
        const sizeInput = document.getElementById('size-filter');
        const sortSelect = document.getElementById('sort-by');
        const priceVal = document.getElementById('price-value');

        if (searchInput) searchInput.value = '';
        if (catFilter) catFilter.value = '';
        if (priceRange) priceRange.value = 10000;
        if (priceVal) priceVal.textContent = 'UP TO 10k BDT';
        if (sizeInput) sizeInput.value = '';
        if (sortSelect) sortSelect.value = 'latest';

        selectedSizes.clear();

        document.querySelectorAll('.filter-chip-stark').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.filter-clear-link').forEach(el => el.classList.remove('visible'));

        // Reset URL (if any slug was present)
        window.history.replaceState({}, '', '/shop');
        loadShopProducts('');
    };

    function populateSizeAndColorFilters(products) {
        const sizeContainer = document.getElementById('size-chips-container');
        if (!sizeContainer) return;

        // Standard Sizes as per user request
        const standardSizes = ['S', 'M', 'L', 'XL', 'XXL'];

        // Sync visual state with internal Sets
        sizeContainer.innerHTML = '';
        standardSizes.forEach(s => {
            const chip = document.createElement('div');
            chip.className = `filter-chip-stark ${selectedSizes.has(s) ? 'active' : ''}`;
            chip.textContent = s;
            chip.onclick = () => toggleSizeFilter(s, chip);
            sizeContainer.appendChild(chip);
        });
    }


    async function loadShopProducts(overrideCategory) {
        const productsRow = document.getElementById('shop-products-row');
        if (!productsRow) return;

        let category = overrideCategory !== undefined ? overrideCategory : URL_CAT;
        if (category === '{{url_cat}}') category = ''; // Handle raw template

        // Reset sub-filters when category is explicitly changed via dropdown
        if (overrideCategory !== undefined) {
            const sizeInput = document.getElementById('size-filter');
            const searchInput = document.getElementById('product-search');
            if (sizeInput) sizeInput.value = '';
            if (searchInput) searchInput.value = '';
        }

        // Update title
        const titleEl = document.getElementById('shop-title');
        const subtitleEl = document.getElementById('shop-subtitle');
        if (category) {
            titleEl.textContent = category.charAt(0).toUpperCase() + category.slice(1);
            subtitleEl.textContent = `Showing new arrivals in "${category}"`;
        } else {
            titleEl.textContent = 'New Arrivals';
            subtitleEl.textContent = 'Showing the latest premium additions';
        }

        // Show loading
        productsRow.innerHTML = `<div class="col-12 text-center py-5"><div class="spinner-border text-primary"></div></div>`;

        try {
            let url = `${API_URL}/products/new-arrivals?limit=50`;
            // Note: the backend does not currently support category filtering on the new-arrivals endpoint directly,
            // so we will fetch all new arrivals and the frontend filtering logic below will filter by category if needed.


            const response = await fetch(url);

            if (!response.ok) {
                const errorData = await response.json().catch(() => ({}));
                throw new Error(errorData.message || `API Error: ${response.status}`);
            }

            allProducts = await response.json();
            populateSizeAndColorFilters(allProducts);
            filterProducts();

        } catch (error) {
            console.error('Error fetching shop products:', error);
            productsRow.innerHTML = `<div class="col-12 text-center text-danger py-5">
                    <i class="fas fa-exclamation-triangle fa-2x mb-3"></i>
                    <p class="fw-bold">Failed to load products.</p>
                    <p class="small theme-text-muted">Reason: ${error.message}</p>
                    <div class="mt-3">
                        <p class="small theme-text-muted">💡 Make sure MySQL (XAMPP) is running and tables are created.</p>
                        <button class="btn btn-sm bg-theme-light rounded-pill px-3 active" data-filter="all">All</button>
                    </div>
                </div>`;
        }
    }

    function filterProducts() {
        const productsRow = document.getElementById('shop-products-row');
        const searchTerm = (document.getElementById('product-search')?.value || '').toLowerCase();
        const maxPrice = parseInt(document.getElementById('price-range')?.value || '10000');
        const sizes = (document.getElementById('size-filter')?.value || '').split(',').filter(Boolean);
        const sortBy = document.getElementById('sort-by')?.value || 'latest';

        let filtered = [...allProducts];

        // Advanced Keyword Match (Frontend fall-through)
        if (searchTerm) {
            filtered = filtered.filter(p => {
                const nameMatch = p.name.toLowerCase().includes(searchTerm);
                const descMatch = (p.description || '').toLowerCase().includes(searchTerm);
                const tagsMatch = (p.tags || '').toLowerCase().includes(searchTerm);
                return nameMatch || descMatch || tagsMatch;
            });
        }

        // Price filter
        filtered = filtered.filter(p => Number(p.sale_price || p.price) <= maxPrice);

        // Multi-Size Filter (Logical OR: shows if it matches ANY selected size)
        if (sizes.length > 0) {
            filtered = filtered.filter(p => {
                if (!p.available_sizes) return false;
                const pSizes = p.available_sizes.split(',').map(s => s.trim());
                return sizes.some(s => pSizes.includes(s));
            });
        }

        // Sorting
        if (sortBy === 'low') {
            filtered.sort((a, b) => Number(a.sale_price || a.price) - Number(b.sale_price || b.price));
        } else if (sortBy === 'high') {
            filtered.sort((a, b) => Number(b.sale_price || b.price) - Number(a.sale_price || a.price));
        } else if (sortBy === 'bestselling') {
            // Heuristic: top selling flag or manual weighting
            filtered.sort((a, b) => (b.is_top_selling || 0) - (a.is_top_selling || 0));
        } else {
            filtered.sort((a, b) => (b.id || 0) - (a.id || 0));
        }

        if (filtered.length === 0) {
            productsRow.innerHTML = `
                <div class="col-12 text-center py-5">
                    <i class="fas fa-search fa-3x mb-4 opacity-25"></i>
                    <h4 class="fw-bold">No results found</h4>
                    <p class="theme-text-muted">We couldn't find anything matching your filters. Try adjusting your search or resetting.</p>
                    <button class="btn btn-dark btn-rect px-4 mt-3" onclick="resetFilters()">Clear All Filters</button>
                </div>`;
            return;
        }

        renderProductCards(productsRow, filtered);
    }

    function renderProductCards(container, products) {
        container.innerHTML = products.map((product, index) => SABILORE_UTILS.renderProductCard(product, undefined, { staggerIndex: (index % 6) + 1 })).join('');

        // Trigger staggered reveal animation for new cards
        if (typeof refreshScrollReveal === 'function') refreshScrollReveal();
    }

    // --- Quick Add to Cart (from card) ---
    function quickAddToCart(productId, name, price, image) {
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        const index = cart.findIndex(item => item.id === productId);

        if (index > -1) {
            cart[index].quantity += 1;
        } else {
            cart.push({ id: productId, quantity: 1, name, price, image });
        }

        localStorage.setItem('cart', JSON.stringify(cart));
        if (typeof updateCartIcon === 'function') updateCartIcon();
        showMiniToast('Added to cart 🛒');

        // Pixel Tracking
        if (typeof trackAddToCart === 'function') {
            trackAddToCart(productId, name, price);
        }
    }

</script>
