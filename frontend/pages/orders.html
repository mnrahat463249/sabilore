<script>
    document.addEventListener('DOMContentLoaded', async () => {
        // Use global window.API_URL and token
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = '/login';
            return;
        }

        const handleReturnRequest = async (e) => {
            e.preventDefault();
            const orderId = document.getElementById('return-order-id').value;
            const productId = document.getElementById('return-product-id').value;
            const reason = document.getElementById('return-reason').value;
            const returnType = document.getElementById('return-type').value;
            const returnMethod = document.getElementById('return-method').value;
            const paymentMethod = document.getElementById('return-payment-method').value;
            const accountNumber = document.getElementById('return-account-number').value;
            const feedback = document.getElementById('return-feedback');
            const submitBtn = e.target.querySelector('button[type="submit"]');

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Submitting...';

            try {
                const res = await fetch(`${API_URL}/orders/return`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        orderId,
                        productId,
                        reason,
                        returnType,
                        returnMethod,
                        paymentMethod,
                        accountNumber
                    })
                });

                const data = await res.json();
                if (!res.ok) throw new Error(data.message || 'Request failed');

                feedback.className = 'alert alert-success small';
                feedback.textContent = 'Return request submitted successfully! We will contact you soon.';
                feedback.classList.remove('d-none');
                setTimeout(() => {
                    bootstrap.Modal.getInstance(document.getElementById('returnRequestModal')).hide();
                    feedback.classList.add('d-none');
                    document.getElementById('return-request-form').reset();
                }, 2000);
            } catch (err) {
                feedback.className = 'alert alert-danger small';
                feedback.textContent = err.message;
                feedback.classList.remove('d-none');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Submit Request';
            }
        };

        const returnForm = document.getElementById('return-request-form');
        if (returnForm) returnForm.addEventListener('submit', handleReturnRequest);

        window.openReturnModal = async (orderId) => {
            document.getElementById('return-order-id').value = orderId;
            const productSelect = document.getElementById('return-product-id');
            productSelect.innerHTML = '<option value="">Loading items...</option>';

            new bootstrap.Modal(document.getElementById('returnRequestModal')).show();

            // Fetch order items to populate select
            try {
                const res = await fetch(`${API_URL}/orders/${orderId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                const items = Array.isArray(data) ? data : (data.items || []);

                productSelect.innerHTML = items.map(item => `
                    <option value="${item.product_id}">${item.name} (${item.size || 'N/A'} / ${item.color || 'N/A'})</option>
                `).join('');
            } catch (err) {
                productSelect.innerHTML = '<option value="">Error loading items</option>';
            }
        };

        // Toggle refund fields based on type
        document.getElementById('return-type').addEventListener('change', (e) => {
            const refundFields = document.getElementById('refund-fields');
            refundFields.style.display = e.target.value === 'Refund' ? 'block' : 'none';
        });

        const loadOrders = async () => {
            try {
                const response = await fetch(`${API_URL}/orders/my-orders`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!response.ok) throw new Error('Failed to load orders');
                const orders = await response.json();

                document.getElementById('orders-loading').classList.add('d-none');

                if (orders.length === 0) {
                    document.getElementById('no-orders').classList.remove('d-none');
                    return;
                }

                const list = document.getElementById('orders-list');
                list.innerHTML = orders.map(order => {
                    const isReturnable = (order.status.toLowerCase() === 'completed' || order.status.toLowerCase() === 'delivered');
                    return `
                    <tr>
                        <td class="ps-4 fw-bold text-primary">${order.order_number || ('#ORD-' + order.id)}</td>
                        <td>${new Date(order.created_at).toLocaleDateString(undefined, { day: 'numeric', month: 'short', year: 'numeric' })}</td>
                        <td>${order.items_count} items</td>
                        <td><small class="text-uppercase fw-bold theme-text-muted">${order.payment_method}</small></td>
                        <td class="fw-bold">৳${Number(order.total_amount).toLocaleString()}</td>
                        <td><span class="badge bg-${getStatusColor(order.status)} bg-opacity-10 text-${getStatusColor(order.status)} rounded-pill px-3">${order.status.toUpperCase()}</span></td>
                        <td class="text-end pe-4">
                            <div class="d-flex justify-content-end gap-2">
                                ${isReturnable ? `<button class="btn btn-sm btn-outline-danger rounded-pill px-3" onclick="openReturnModal(${order.id})">Return</button>` : ''}
                                <button class="btn btn-sm btn-dark rounded-pill px-3" onclick="viewOrderDetails(${order.id})">View</button>
                            </div>
                        </td>
                    </tr>
                `;
                }).join('');

                // Mobile cards
                const mobileCards = document.getElementById('orders-cards-mobile');
                if (mobileCards) {
                    mobileCards.innerHTML = orders.map(order => {
                        const isReturnable = (order.status.toLowerCase() === 'completed' || order.status.toLowerCase() === 'delivered');
                        return `
                        <div class="order-card-mobile">
                            <div class="order-card-header">
                                <span class="fw-bold">${order.order_number || ('#ORD-' + order.id)}</span>
                                <span class="badge bg-${getStatusColor(order.status)} bg-opacity-10 text-${getStatusColor(order.status)} rounded-pill px-3">${order.status.toUpperCase()}</span>
                            </div>
                            <div class="order-card-row">
                                <span class="label">Date</span>
                                <span class="value">${new Date(order.created_at).toLocaleDateString(undefined, { day: 'numeric', month: 'short', year: 'numeric' })}</span>
                            </div>
                            <div class="order-card-row">
                                <span class="label">Total</span>
                                <span class="value">৳${Number(order.total_amount).toLocaleString()}</span>
                            </div>
                            <div class="mt-3 d-flex gap-2">
                                <button class="btn btn-sm btn-dark rounded-pill px-4 flex-grow-1" onclick="viewOrderDetails(${order.id})">Details</button>
                                ${isReturnable ? `<button class="btn btn-sm btn-outline-danger rounded-pill px-4 flex-grow-1" onclick="openReturnModal(${order.id})">Return</button>` : ''}
                            </div>
                        </div>
                    `;
                    }).join('');
                }

                document.getElementById('orders-table').classList.remove('d-none');
            } catch (err) {
                console.error(err);
                document.getElementById('orders-loading').innerHTML = '<p class="text-danger">Failed to load orders.</p>';
            }
        };

        window.viewOrderDetails = async (id) => {
            const modal = new bootstrap.Modal(document.getElementById('orderModal'));
            modal.show();

            const modalLoading = document.getElementById('modal-loading');
            const modalContent = document.getElementById('modal-content');
            modalLoading.classList.remove('d-none');
            modalContent.classList.add('d-none');

            try {
                const res = await fetch(`${API_URL}/orders/${id}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();

                // Handle both array (items only) and object with items + order info
                const items = Array.isArray(data) ? data : (data.items || []);
                const order = Array.isArray(data) ? null : data.order;

                const list = document.getElementById('order-items-list');
                list.innerHTML = items.map(item => {
                    let imgToUse = item.variant_image || item.image;
                    let imgSrc = imgToUse ? (imgToUse.startsWith('http') ? imgToUse : (imgToUse.startsWith('/') ? imgToUse : '/' + imgToUse)) : '/img/placeholder.png';
                    // Fix double slashes just in case
                    imgSrc = imgSrc.replace(/([^:]\/)\/+/g, "$1");

                    return `
                    <div class="d-flex align-items-center mb-3">
                        <a href="/product/${item.slug}">
                            <img loading="lazy" decoding="async" src="${imgSrc}" class="order-item-thumb me-3">
                        </a>
                        <div class="flex-grow-1">
                            <a href="/product/${item.slug}" class="text-decoration-none text-body">
                                <h6 class="mb-0 fw-bold">${item.name}</h6>
                            </a>
                            <small class="theme-text-muted">${item.size ? 'Size: ' + item.size + ' · ' : ''}Quantity: ${item.quantity} x ৳${parseFloat(item.price).toLocaleString()}</small>
                        </div>
                        <div class="text-end">
                            <span class="fw-bold">৳${(item.quantity * item.price).toLocaleString()}</span>
                        </div>
                    </div>
                `}).join('');

                // Show order meta info if available
                const metaEl = document.getElementById('order-meta');
                if (order) {
                    metaEl.innerHTML = `
                        <div class="col-md-4">
                            <small class="theme-text-muted d-block">Status</small>
                            <span class="badge bg-${getStatusColor(order.status)} bg-opacity-10 text-${getStatusColor(order.status)} rounded-pill px-3">${(order.status || 'N/A').toUpperCase()}</span>
                        </div>
                        <div class="col-md-4">
                            <small class="theme-text-muted d-block">Payment</small>
                            <strong class="text-uppercase">${order.payment_method || 'N/A'}</strong>
                        </div>
                        <div class="col-md-4">
                            <small class="theme-text-muted d-block">Total</small>
                            <strong class="text-primary">৳${Number(order.total_amount || 0).toLocaleString()}</strong>
                        </div>
                        ${order.shipping_address ? `<div class="col-12 mt-2"><small class="theme-text-muted d-block">Shipping Address</small><span>${order.shipping_address}${order.shipping_city ? ', ' + order.shipping_city : ''}</span></div>` : ''}
                    `;
                } else {
                    metaEl.innerHTML = '';
                }

                modalLoading.classList.add('d-none');
                modalContent.classList.remove('d-none');
            } catch (err) {
                console.error(err);
                modalLoading.innerHTML = '<p class="text-danger">Error loading details</p>';
            }
        };

        loadOrders();
    });

    function getStatusColor(status) {
        if (!status) return 'secondary';
        switch (status.toLowerCase()) {
            case 'pending': return 'warning';
            case 'processing': return 'info';
            case 'shipped': return 'primary';
            case 'delivered':
            case 'completed': return 'success';
            case 'cancelled': return 'danger';
            default: return 'secondary';
        }
    }
</script>
