<div class="container py-5">
    <h1 class="fw-bold mb-4">Your Shopping Cart</h1>

    <div class="row g-4">
        
        <div class="col-lg-8">
            <div id="cart-items-container" class="bg-theme-aware rounded-4 shadow-sm p-4 border">
                
                <div class="text-center py-5">
                    <i class="fas fa-shopping-cart fa-3x theme-text-muted opacity-25 mb-3"></i>
                    <p class="theme-text-muted">Your cart is empty.</p>
                    <a href="/shop" class="btn btn-dark rounded-pill px-4">Start Shopping</a>
                </div>
            </div>
        </div>

        
        <div class="col-lg-4">
            <div class="bg-theme-aware rounded-4 shadow-sm p-4 sticky-top border cart-summary-sticky">
                <h5 class="fw-bold mb-4">Order Summary</h5>

                <div class="mb-4">
                    <label for="delivery-location" class="form-label small fw-bold">Delivery Destination</label>
                    <select id="delivery-location" class="form-select rounded-pill bg-theme-light border-0 px-3 select-theme-text"
                        onchange="updateSummary()">
                        <option value="inside">Inside Dhaka (80 BDT)</option>
                        <option value="outside">Outside Dhaka (140 BDT)</option>
                        <option value="express">⚡ Express 12–24H — Only Dhaka (150 BDT)</option>
                    </select>
                    <p class="theme-text-muted smallest mt-2 px-2">Inside Dhaka: 1-3 days &nbsp;|&nbsp; Outside Dhaka:
                        3-5 days &nbsp;|&nbsp; Express: 12-24h</p>
                </div>

                <div class="d-flex justify-content-between mb-2">
                    <span class="theme-text-muted">Subtotal</span>
                    <span id="summary-subtotal" class="fw-bold">0 BDT</span>
                </div>
                <div class="d-flex justify-content-between mb-2">
                    <span class="theme-text-muted">Delivery Fee</span>
                    <span id="summary-delivery">80 BDT</span>
                </div>
                <hr class="border-secondary opacity-25">
                <div class="d-flex justify-content-between mb-4">
                    <span class="fw-bold h5">Total</span>
                    <span id="summary-total" class="fw-bold h5 text-primary">0 BDT</span>
                </div>

                <button onclick="proceedToCheckout()" class="btn btn-dark w-100 rounded-pill py-3">Proceed to
                    Checkout</button>

                <div class="mt-4 p-3 bg-theme-light rounded-3 small">
                    <p class="mb-0 theme-text-muted"><i class="fas fa-shield-alt me-2"></i> Secure Checkout Guaranteed
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let cartDetails = [];
    const PLACEHOLDER = '/img/placeholder.jpg';
    const DELIVERY_FEES = { inside: 80, outside: 140, express: 150 };

    document.addEventListener('DOMContentLoaded', () => {
        // Wire up delivery dropdown — both 'change' and 'input' for full browser compatibility
        const deliverySelect = document.getElementById('delivery-location');
        if (deliverySelect) {
            deliverySelect.addEventListener('change', () => updateSummary());
            deliverySelect.addEventListener('input', () => updateSummary());
        }
        renderCart();
    });

    async function renderCart() {
        const container = document.getElementById('cart-items-container');
        const cartItems = window.SABILORE_UTILS.Cart.get();

        if (cartItems.length === 0) {
            container.innerHTML = `
                <div class="text-center py-5">
                    <i class="fas fa-shopping-cart fa-3x theme-text-muted opacity-25 mb-3"></i>
                    <p class="theme-text-muted">Your cart is empty.</p>
                    <a href="/shop" class="btn btn-dark rounded-pill px-4">Start Shopping</a>
                </div>`;
            updateSummary(0);
            return;
        }

        try {
            const ids = cartItems.map(item => item.id);
            const products = await window.SABILORE_UTILS.fetchBulkProducts(ids);

            cartDetails = cartItems.map(item => {
                const product = products.find(p => p.id === item.id);
                return { ...item, ...product };
            }).filter(item => item.name);

            if (cartDetails.length === 0) {
                container.innerHTML = '<p class="text-center py-5">Items in your cart are no longer available.</p>';
                return;
            }

            container.innerHTML = cartDetails.map((item, index) => {
                const imageUrl = item.image
                    ? (item.image.startsWith('http') ? item.image : window.BASE_URL + item.image)
                    : PLACEHOLDER;
                return `
                        <div class="d-flex align-items-center mb-4 pb-4 border-bottom">
                            <a href="product/${item.slug || item.id}" class="flex-shrink-0">
                                <img loading="lazy" decoding="async" src="${imageUrl}" class="rounded-3 me-3" style="width: 80px; height: 100px; object-fit: cover; cursor: pointer;" onerror="this.src='https://via.placeholder.com/100'">
                            </a>
                            <div class="flex-grow-1">
                                <a href="product/${item.slug || item.id}" class="text-decoration-none" style="color: var(--text-main);">
                                    <h6 class="fw-bold mb-1">${item.name}</h6>
                                </a>
                                <div class="d-flex flex-wrap gap-2 mb-1">
                                    ${item.size ? `<span class="badge bg-dark rounded-pill px-2 py-1" style="font-size:0.7rem;">Size: ${item.size}</span>` : ''}
                                    ${item.color ? `<span class="badge bg-secondary rounded-pill px-2 py-1" style="font-size:0.7rem;">Color: ${item.color}</span>` : ''}
                                </div>
                            </div>
                            <div class="text-end">
                                <div class="fw-bold mb-2">${Number(item.price).toLocaleString()} BDT</div>
                                <div class="d-flex align-items-center justify-content-end gap-3">
                                    <button onclick="updateQty(${index}, -1)" class="btn btn-sm btn-light rounded-circle"><i class="fas fa-minus"></i></button>
                                    <span class="fw-bold">${item.quantity}</span>
                                    <button onclick="updateQty(${index}, 1)" class="btn btn-sm btn-light rounded-circle"><i class="fas fa-plus"></i></button>
                                </div>
                            </div>
                        </div>`;
            }).join('');

            updateSummary(cartDetails.reduce((sum, item) => sum + (item.quantity * Number(item.price)), 0));
        } catch (error) {
            console.error('Cart render error:', error);
            container.innerHTML = '<p class="text-center text-danger py-5">Error loading cart items.</p>';
        }
    }

    function updateQty(index, delta) {
        window.SABILORE_UTILS.Cart.updateQty(index, delta);
        renderCart();
    }

    function updateSummary(subtotal) {
        // Recalculate from cartDetails if not passed (called from onchange)
        if (subtotal === undefined) {
            subtotal = cartDetails.reduce((sum, item) => sum + (Number(item.quantity) * Number(item.price)), 0);
            // Last-resort fallback: read subtotal from current DOM text
            if (!subtotal) {
                const el = document.getElementById('summary-subtotal');
                subtotal = el ? Number(el.textContent.replace(/[^0-9.]/g, '')) : 0;
            }
        }
        const loc = document.getElementById('delivery-location').value;
        const fees = { inside: 80, outside: 140, express: 150 };
        const deliveryFee = subtotal > 0 ? (fees[loc] !== undefined ? fees[loc] : 80) : 0;
        document.getElementById('summary-subtotal').textContent = `${subtotal.toLocaleString()} BDT`;
        document.getElementById('summary-delivery').textContent = `${deliveryFee} BDT`;
        document.getElementById('summary-total').textContent = `${(subtotal + deliveryFee).toLocaleString()} BDT`;
    }

    function proceedToCheckout() {
        if (window.SABILORE_UTILS.Cart.get().length === 0) {
            alert('Your cart is empty!');
            return;
        }
        window.location.href = 'checkout';
    }
</script>
